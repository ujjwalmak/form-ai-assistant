<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FormAssist">
  <defs>
    <linearGradient id="faTile" x1="6" y1="4" x2="58" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b5cf6"/>
      <stop offset="0.52" stop-color="#d946ef"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="faSheen" x1="32" y1="4" x2="32" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="faGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(48 16) rotate(90) scale(20)">
      <stop stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="faClip">
      <rect x="4" y="4" width="56" height="56" rx="17"/>
    </clipPath>
  </defs>

  <!-- Glas-Kachel -->
  <g clip-path="url(#faClip)">
    <rect x="4" y="4" width="56" height="56" fill="url(#faTile)"/>
    <rect x="4" y="4" width="56" height="56" fill="url(#faSheen)"/>
    <!-- weicher Lichtpunkt oben rechts -->
    <circle cx="48" cy="16" r="18" fill="url(#faGlow)"/>
  </g>
  <rect x="4.75" y="4.75" width="54.5" height="54.5" rx="16.25" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- Formularzeilen -->
  <g fill="#ffffff">
    <rect x="15" y="21" width="26" height="5" rx="2.5" opacity="0.96"/>
    <rect x="15" y="32" width="34" height="5" rx="2.5" opacity="0.78"/>
    <rect x="15" y="43" width="17" height="5" rx="2.5" opacity="0.58"/>
  </g>

  <!-- KI-Funke -->
  <path d="M46.5 38.5c.5 3.1 1.4 4 4.5 4.5-3.1.5-4 1.4-4.5 4.5-.5-3.1-1.4-4-4.5-4.5 3.1-.5 4-1.4 4.5-4.5z" fill="#ffffff"/>
</svg>
