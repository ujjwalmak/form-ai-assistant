site_name: FormAssist — KI Formular-Assistent
site_description: >-
  Chrome-Extension, die Online-Formulare scannt, in einfacher Sprache erklärt
  und mit einem KI-Agenten ausfüllt.
site_author: Maximilian Plitzko und Ujjwal Makkar
repo_url: https://github.com/ujjwalmak/form-ai-assistant
repo_name: form-ai-assistant
site_url: https://ujjwalmak.github.io/form-ai-assistant/
docs_dir: docs
site_dir: site

theme:
  name: material
  language: de
  logo: img/logo.svg
  favicon: img/logo.svg
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    scheme: slate
    primary: deep purple
    accent: pink
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - search.suggest
    - search.highlight
    - search.share

extra_css:
  - stylesheets/extra.css

copyright: >-
  © 2026 FormAssist — Studienprojekt im Modul AI-Prototyping (HM, FK07)

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ujjwalmak/form-ai-assistant
      name: Repository auf GitHub
  generator: false

nav:
  - Start: index.md
  - Produkt: nutzer.md
  - Technologie: architektur.md
  - Engineering: entwicklung.md
  - Entscheidungen: entscheidungen.md
  - Status & Reflexion: projektstand.md
  - Referenz:
      - Vollständiger Projektstand: reference/projektstand-vollstaendig.md
      - Reflexion: reference/reflexion.md
      - Testing Plan: reference/testing-plan.md
      - Product Vision: reference/product-vision.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true
